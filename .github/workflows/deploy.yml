name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Deploy to Hostinger via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server: 46.202.138.85
          port: 65002
          username: u772304123
          password: ${{ secrets.FTP_PASSWORD }}
          sftp_only: true
          local_path: ./out/*
          remote_path: /home/u772304123/domains/avrixodigitals.com/public_html
          delete_remote_files: true
