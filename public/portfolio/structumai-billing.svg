<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="StructumAI Estimating &amp; Billing">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0c0f"/>
      <stop offset="1" stop-color="#161318"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="22%" r="55%">
      <stop offset="0" stop-color="#e31e24" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#e31e24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e31e24"/>
      <stop offset="1" stop-color="#9a1418"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200 M0 600 H1200"/>
    <path d="M150 0 V750 M300 0 V750 M450 0 V750 M600 0 V750 M750 0 V750 M900 0 V750 M1050 0 V750"/>
  </g>

  <!-- abstract ledger / pay-app columns motif -->
  <g transform="translate(770,470)" opacity="0.9">
    <rect x="0"   y="60"  width="46" height="120" rx="6" fill="#ffffff" fill-opacity="0.06"/>
    <rect x="64"  y="20"  width="46" height="160" rx="6" fill="#ffffff" fill-opacity="0.08"/>
    <rect x="128" y="-30" width="46" height="210" rx="6" fill="url(#bar)" fill-opacity="0.85"/>
    <rect x="192" y="40"  width="46" height="140" rx="6" fill="#ffffff" fill-opacity="0.06"/>
    <rect x="256" y="90"  width="46" height="90"  rx="6" fill="#ffffff" fill-opacity="0.05"/>
  </g>

  <!-- eyebrow -->
  <text x="90" y="270" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="6" fill="#e31e24">AVRIXO · PRODUCT WE ENGINEERED</text>

  <!-- wordmark -->
  <text x="86" y="370" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="900" fill="#ffffff" letter-spacing="-2">StructumAI</text>

  <!-- accent line -->
  <rect x="92" y="400" width="120" height="6" rx="3" fill="#e31e24"/>

  <!-- module name -->
  <text x="90" y="470" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800" fill="#ffffff" fill-opacity="0.82">Estimating &amp; Billing</text>
</svg>
