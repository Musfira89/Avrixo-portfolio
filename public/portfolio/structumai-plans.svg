<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="StructumAI Plans — Real-time Collaboration">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0c0f"/>
      <stop offset="1" stop-color="#161318"/>
    </linearGradient>
    <radialGradient id="glow2" cx="22%" cy="78%" r="55%">
      <stop offset="0" stop-color="#e31e24" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#e31e24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="750" fill="url(#bg2)"/>
  <rect width="1200" height="750" fill="url(#glow2)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200 M0 600 H1200"/>
    <path d="M150 0 V750 M300 0 V750 M450 0 V750 M600 0 V750 M750 0 V750 M900 0 V750 M1050 0 V750"/>
  </g>

  <!-- abstract blueprint / plan-sheet motif -->
  <g transform="translate(760,150)" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2">
    <rect x="0" y="0" width="320" height="230" rx="10"/>
    <path d="M0 70 H320 M0 150 H320 M110 0 V230 M220 0 V230"/>
  </g>
  <!-- live cursors -->
  <circle cx="880" cy="232" r="9" fill="#e31e24"/>
  <circle cx="980" cy="300" r="9" fill="#ffffff" fill-opacity="0.65"/>
  <circle cx="820" cy="320" r="9" fill="#ffffff" fill-opacity="0.4"/>

  <!-- eyebrow -->
  <text x="90" y="270" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="6" fill="#e31e24">AVRIXO · PRODUCT WE ENGINEERED</text>

  <!-- wordmark -->
  <text x="86" y="370" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="900" fill="#ffffff" letter-spacing="-2">StructumAI</text>

  <!-- accent line -->
  <rect x="92" y="400" width="120" height="6" rx="3" fill="#e31e24"/>

  <!-- module name -->
  <text x="90" y="470" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="800" fill="#ffffff" fill-opacity="0.82">Plans — Real-time Collaboration</text>
</svg>
